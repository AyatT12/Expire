<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتهت صلاحية الرابط - بنان</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #faf8f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      border: 0.5px solid #39629c;
      position: relative;
      direction: rtl;
    }

    .cardContent {
      padding: 0px 32px 32px;
    }

    .logo-ring {
      display: flex;
      align-items: center;
      justify-content: start;
      color: #39629c;
      padding: 24px;
      gap: 12px;
    }

    .logo-ring img {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }

    .logo-text {
      text-align: start;
    }
    .Ar_text{
      font-size: 17px;
    }
    .En_text{
      font-size: 12px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #b40202;
      line-height: 1.5;
    }

    .title p {
      color: #b40202;
      font-weight: 600;
    }

    .desc {
      font-size: 15px;
      color: #39629c;
      line-height: 1.9;
      margin-bottom: 1px;
    }

    hr {
      border: none;
      border-top: 0.5px solid #39629c;
      margin-bottom: 24px;
    }

    .btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #39629c;
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      width: 100%;
      transition: background 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn-main:hover {
      background: #39629c;
      color: #ffffff;
    }

    .btn-main i {
      font-size: 18px;
    }

    @media (max-width: 576px) {
      .card {
        padding: 15px !important;
      }
      .logo-ring{
        padding: 0 !important;
        gap: 5px;
      }
      .cardContent{
        padding: 0 !important;
      }
       .btn-main {
        padding: 12px 18px !important;
        font-size: 13px !important;
      }

    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo-ring">
      <img id="logoImg" src="Logo.svg" alt="شعار بنان" />
      <div class="logo-text">
        <p class="Ar_text mb-1">بنان لإدارة شركات ومكاتب تأجير السيارات</p>
        <p class="En_text">Bnan for managing car rental companies and offices</p>
      </div>
    </div>

    <div class="cardContent">
      <div class="title">
        <h1 class="mb-1">عفواً، انتهت صلاحية الرابط</h1>
        <p dir="ltr" style="font-size: 12px;">Sorry, the link has expired.</p>
      </div>
      <p class="desc">بامكانك البحث من خلال الموقع</p>
      <p class="desc" dir="ltr" style="font-size: 12px;">You can search through the website.</p>

      <hr />

      <a href="https://bnan.ghyum.sa/#/document-check" class="btn-main">
        <i class="ti ti-search"></i>
       الموقع
      </a>
    </div>
  </div>
</body>

</html>
