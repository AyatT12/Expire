<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انتهت صلاحية الرابط - بنان</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #faf8f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 48px 40px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 0.5px solid #39629c;
      position: relative;
      direction: rtl;
    }

    .logo-ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-ring img {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }

    .logo-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .logo-fallback i {
      font-size: 32px;
      color: #ffce94;
    }

    .logo-fallback span {
      font-size: 11px;
      color: #39629c;
      font-weight: 500;
    }

    .badge-pill {
      display: inline-block;
      color: #A32D2D;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .badge-pill i {
      font-size: 13px;
      vertical-align: -2px;
      margin-left: 4px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #39629c;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .desc {
      font-size: 14px;
      color: #39629c;
      line-height: 1.9;
      margin-bottom: 15px;
    }

    .desc strong {
      color: #39629c;
    }

    hr {
      border: none;
      border-top: 0.5px solid #39629c;
      margin-bottom: 24px;
    }

    .svc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .svc-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #EEEDFE;
      border: 0.5px solid #39629c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .svc-icon i {
      font-size: 20px;
      color: #39629c;
    }

    .svc span {
      font-size: 11px;
      color: #7F77DD;
      font-weight: 500;
    }

    .btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #39629c;
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      width: 100%;
      transition: background 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn-main:hover {
      background: #39629c;
      color: #ffffff;
    }

    .btn-main i {
      font-size: 18px;
    }

    @media (max-width: 576px) {
      .card {
        padding: 20px !important;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo-ring" id="logoRing">
      <img id="logoImg" src="Logo.svg" alt="شعار بنان" />
    </div>

    <div class="badge-pill">
      <i class="ti ti-clock-off"></i>
      انتهت الصلاحية
    </div>

    <h1>عفواً، انتهت صلاحية الرابط</h1>

    <p class="desc">
      بإمكانك الاطلاع على <strong>العقود والفواتير</strong> وسندات القبض والصرف
      من خلال موقع <strong>بنان</strong> لإدارة شركات ومكاتب تأجير السيارات
    </p>

    <hr />

    <a href="https://bnan.ghyum.sa/#/document-check" class="btn-main">
      <i class="ti ti-search"></i>
      البحث عن المستندات
    </a>
  </div>
</body>

</html>
